<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Архив экспедиции</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0a0a0a;
    color:#d7d7d7;
    font-family: "Courier New", monospace;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.panel{
    background:#111;
    border:1px solid #2b2b2b;
    padding:25px;
    box-shadow:0 0 20px rgba(0,255,120,0.08);
    margin-bottom:25px;
}

h1,h2{
    color:#98ff98;
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    background:#0f0f0f;
    border:1px solid #333;
    color:#fff;
    margin-top:10px;
    font-size:16px;
}

button{
    margin-top:12px;
    padding:12px 18px;
    background:#163d16;
    color:#d8ffd8;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#245f24;
}

.hidden{
    display:none;
}

#output{
    white-space:pre-line;
    line-height:1.6;
    min-height:200px;
}

.cursor::after{
    content:"_";
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,50%{opacity:1;}
    51%,100%{opacity:0;}
}

.error{
    color:#ff7070;
    margin-top:10px;
}

.success{
    color:#8cff8c;
}

hr{
    border:0;
    border-top:1px solid #222;
    margin:25px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="panel" id="loginPanel">
<h1>Архив полевых записей</h1>
<p>Введите ключ доступа.</p>

<input type="password" id="mainPass" placeholder="Пароль">
<button onclick="login()">Войти</button>

<div id="loginError" class="error"></div>
</div>

<div class="panel hidden" id="storyPanel">
<h2 id="sectionTitle">Загрузка...</h2>

<div id="output" class="cursor"></div>

<hr>

<div id="nextBlock">
<input type="text" id="nextPass" placeholder="Введите следующий пароль">
<button onclick="nextFragment()">Подтвердить</button>
<div id="nextError" class="error"></div>
</div>

</div>

</div>

<script>
/* ---------- НАСТРОЙКИ ---------- */

/* стартовый пароль входа */
const startPassword = "focus naturalis epizooticus";

/* список фрагментов */
const fragments = [
{
title:"Фрагмент 1",
text:`После проведённых в исследованиях часов, я почти уверен, что подобное уже происходило здесь раньше.

Никто в этом городе не хочет говорить прямо. Одни делают вид, будто ничего не помнят, другие замолкают, едва разговор касается тех событий.

Но косвенные улики повторяются от источника к источнику: оцепленные улицы, ночная эвакуация и военные машины без опознавательных знаков.

Были слухи, что военные вывозили часть людей.

Я нашёл место, где до сих пор сохранилась техника, похожая на ту, что использовалась тогда...

Среди экспонатов тебе нужна машина, использовавшаяся для транспортивок и поступившая на вооружение в начале 1970-х годов.

Найди её информационную табличку и выясни:

какова мощность одного двигателя?

Введи только число.,
password:"120"
},

{
title:"Фрагмент 2",
text:`Теперь я уверен: эвакуация действительно была.

Но куда важнее другое — кто именно отдал приказ скрыть случившееся?

Я встретился с человеком, который вёл один из БТРов в ту вспышку. Он рассказал мне о человеке, который был приближен к администрации города и пытался оставить свидетельства тех событий.

Будучи вовлечённым в расследование эпидемии, он спрятал внутри одной из картин своей галереи намёк для тех, кто станет искать правду спустя годы.

Отправляйся в городскую картинную галерею.

Найди работу, на которой изображён человек под луной, рассказывающий собравшимся о недосягаемом и вечном.

Когда найдёшь нужную картину - введи её название. Без кавычек, все буквы должны быть маленькими, сохрани пробелы.`,
password:"рассказ о далёких мирах"
},

{
title:"Фрагмент 3",
text:`Сведения о случившемся почти уничтожены.

Один из работников галереи, заставший её основателя, подтвердил: после вспышки в городе активно уничтожали любые упоминания о болезни.

Однако медицинские книги проверяли не столь тщательно, поэтому он посоветовал мне искать информацию в них.

Отправляйся в библиотеку на улице Калинина, дом 13. Найди отдел с медицинской литературой.

Тебе нужна книга “История медицины” Т. С. Сорокиной.

Когда она будет у тебя, используй книжный шифр, где первая цифра означает страницу, вторая - номер абзаца, третья - номер строки в абзаце, а последняя - номер слова в строке.

Выпиши слова:

209-1-5-1
209-1-5-2

312-3-3-3
312-3-4-1

411-2-3-6

514-7-2-2
514-7-2-4

Все слова запиши в поле пароля с маленькой буквы через пробел.`,
password:"называли мором окуривание дымом ликвидации сопоставляйте факты"
},

{
title:"Фрагмент 4",
text:`Нашёл в записях упоминание о лесном пионерском лагере, как о рассаднике эпидемии.

Именно там, судя по всему, появились первые заболевшие.

Врачи того времени подозревали источник воды - родник - неподалёку от лагеря. Дети постоянно брали оттуда воду.

Если источник заражён - это многое объясняет. Отправляюсь туда для расследования.

Найди родник в Химкинском лесопарке.

Рядом должна находиться табличка с исследованием воды.

Найди показатель: “Общее микробное число” и введи только его значение.`,
password:"0"
},

{
title:"Фрагмент 5",
text:`Вода оказалась чистой.

Значит, причина была иной.

Пока я осматривал источник, разговорился со стариком, который пришёл за водой. Он оказался местным и рассказал странную вещь: несмотря на цензуру со стороны администрации, некоторые художники пытались сопротивляться и оставить скрытые сообщения о произошедшем.

Их работы вычистили из галлереи, но некоторые до сих пор можно найти в этом лесу. Нужно найти их.

Поднимись по ступеням к шумной дороге, поверни налево и иди вдоль неё, пока не найдёшь проход под дорогой. Продолжай путь дальше, пока не найдёшь второй такой же проход по правую руку от тебя.

Пройди мимо четырёх столбов. Посмотри налево.

Ты увидишь крупное изображение.

Опиши его одним словом. Оно и будет паролем.`,
password:"земля"
},

{
title:"Фрагмент 6",
text:`Художники действительно оставили подсказку.

Благодаря ей я наконец получил координаты лагеря, где всё началось.

Я надеюсь найти в лагере любые документы, которые будут повествовать о той эпидемии. Любая подсказка поможет мне победить в гонке со временем и болезнью.

Отправляйся к лагерю.

От тунеля, в котором ты нашёл рисунки, выйди к дороге ул. Академика Грушина. Поверни направо, дойди до места с воротами по левую руку и сверни на тропинку по правую.
    
Следуй по этой тропинке и ищи здание. Когда найдёшь его, зайди внутрь и ищи на стенах надпись, сделанную белой краской и подписанную моими инициалами.

Введи найденное слово.`,
password:"MORS"
},

{
title:"Фрагмент 7",
text:`Как я ожидал: они закрыли лагерь после инцидента и вычистили первый корпус. Теперь это место заброшено.

Улики уничтожены, следы стёрты, документы сожжены.

Но я не оставляю надежды и двигаюсь ко второму корпусу. Я верю, что хоть что-то уцелело.

Найди второй корпус. Внимательно осмотри помещения.

Ищи последнюю подсказку...`,
password:"vita"
},

{
title:"ФИНАЛ",
text:`Удача оказалась на моей стороне. Мне удалось найти несколько уцелевших документов.

Большая часть текста повреждена, но некоторые фразы всё ещё можно разобрать.

Там говорится, что болезнь, поразившая детей, характерна для северных стран.

Кажется, я на пороге ответа. Пора начать поиск лекарства, которое сможет спасти город.

Следуй по моему следу и помни:

Veritas in tenebris latet.

____________________________
    
Ключ-подсказка получен:

болезнь северного полушария

____________________________

25.04`,
password:null
}

];

/* ---------- ЛОГИКА ---------- */

let current = 0;

function login(){
    const val = document.getElementById("mainPass").value.trim().toLowerCase();

    if(val === startPassword.toLowerCase()){
        document.getElementById("loginPanel").classList.add("hidden");
        document.getElementById("storyPanel").classList.remove("hidden");
        loadFragment();
    }else{
        document.getElementById("loginError").innerText = "Неверный ключ.";
    }
}

function nextFragment(){
    const expected = fragments[current].password;

    if(expected === null) return;

    const val = document.getElementById("nextPass").value.trim().toLowerCase();

    if(val === expected.toLowerCase()){
        current++;
        document.getElementById("nextPass").value = "";
        document.getElementById("nextError").innerText = "";
        loadFragment();
    }else{
        document.getElementById("nextError").innerText = "Ошибка ввода.";
    }
}

function loadFragment(){
    const frag = fragments[current];

    document.getElementById("sectionTitle").innerText = frag.title;

    typeText(frag.text, document.getElementById("output"));

    if(frag.password === null){
        document.getElementById("nextBlock").classList.add("hidden");
    }else{
        document.getElementById("nextBlock").classList.remove("hidden");
    }
}

function typeText(text, element){
    element.innerHTML = "";
    element.classList.add("cursor");

    let i = 0;

    const speed = 18;

    const timer = setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;

        if(i >= text.length){
            clearInterval(timer);
            element.classList.remove("cursor");
        }

    }, speed);
}
</script>

</body>
</html>
