<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Архив экспедиции</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0a0a0a;
    color:#d7d7d7;
    font-family: "Courier New", monospace;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.panel{
    background:#111;
    border:1px solid #2b2b2b;
    padding:25px;
    box-shadow:0 0 20px rgba(0,255,120,0.08);
    margin-bottom:25px;
}

h1,h2{
    color:#98ff98;
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    background:#0f0f0f;
    border:1px solid #333;
    color:#fff;
    margin-top:10px;
    font-size:16px;
}

button{
    margin-top:12px;
    padding:12px 18px;
    background:#163d16;
    color:#d8ffd8;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#245f24;
}

.hidden{
    display:none;
}

#output{
    white-space:pre-line;
    line-height:1.6;
    min-height:200px;
}

.cursor::after{
    content:"_";
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,50%{opacity:1;}
    51%,100%{opacity:0;}
}

.error{
    color:#ff7070;
    margin-top:10px;
}

.success{
    color:#8cff8c;
}

hr{
    border:0;
    border-top:1px solid #222;
    margin:25px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="panel" id="loginPanel">
<h1>Архив полевых записей</h1>
<p>Введите ключ доступа.</p>

<input type="password" id="mainPass" placeholder="Пароль">
<button onclick="login()">Войти</button>

<div id="loginError" class="error"></div>
</div>

<div class="panel hidden" id="storyPanel">
<h2 id="sectionTitle">Загрузка...</h2>

<div id="output" class="cursor"></div>

<hr>

<div id="nextBlock">
<input type="text" id="nextPass" placeholder="Введите следующий пароль">
<button onclick="nextFragment()">Подтвердить</button>
<div id="nextError" class="error"></div>
</div>

</div>

</div>

<script>
/* ---------- НАСТРОЙКИ ---------- */

/* стартовый пароль входа */
const startPassword = "ключ18";

/* список фрагментов */
const fragments = [
{
title:"Фрагмент 1 — Галерея",
text:`[Здесь вставишь свой текст]
Описание локации.
Сюжет.
Задание.`,
password:"пароль1"
},

{
title:"Фрагмент 2 — Библиотека",
text:`[Твой текст]
Описание задачи с книгой.
Шифр.
Следующая цель.`,
password:"пароль2"
},

{
title:"Фрагмент 3 — Памятник",
text:`[Твой текст]
Найти объект.
Получить дату.`,
password:"пароль3"
},

{
title:"Фрагмент 4 — Родник",
text:`[Твой текст]
Маршрут.
Поиск растения.`,
password:"пароль4"
},

{
title:"Фрагмент 5 — Граффити",
text:`[Твой текст]
Найти рисунок.
Ввести ассоциацию.`,
password:"пароль5"
},

{
title:"Фрагмент 6 — Лагерь / Корпус №1",
text:`[Твой текст]
Поиск конверта.`,
password:"пароль6"
},

{
title:"Фрагмент 7 — Лагерь / Корпус №2",
text:`[Твой текст]
Финальное испытание.`,
password:"пароль7"
},

{
title:"ФИНАЛ",
text:`Ключ-подсказка получен.

FOCUS NATURALIS EPIZOOTICUS

Следующая дата дневника: 25.04`,
password:null
}

];

/* ---------- ЛОГИКА ---------- */

let current = 0;

function login(){
    const val = document.getElementById("mainPass").value.trim().toLowerCase();

    if(val === startPassword.toLowerCase()){
        document.getElementById("loginPanel").classList.add("hidden");
        document.getElementById("storyPanel").classList.remove("hidden");
        loadFragment();
    }else{
        document.getElementById("loginError").innerText = "Неверный ключ.";
    }
}

function nextFragment(){
    const expected = fragments[current].password;

    if(expected === null) return;

    const val = document.getElementById("nextPass").value.trim().toLowerCase();

    if(val === expected.toLowerCase()){
        current++;
        document.getElementById("nextPass").value = "";
        document.getElementById("nextError").innerText = "";
        loadFragment();
    }else{
        document.getElementById("nextError").innerText = "Ошибка ввода.";
    }
}

function loadFragment(){
    const frag = fragments[current];

    document.getElementById("sectionTitle").innerText = frag.title;

    typeText(frag.text, document.getElementById("output"));

    if(frag.password === null){
        document.getElementById("nextBlock").classList.add("hidden");
    }else{
        document.getElementById("nextBlock").classList.remove("hidden");
    }
}

function typeText(text, element){
    element.innerHTML = "";
    element.classList.add("cursor");

    let i = 0;

    const speed = 18;

    const timer = setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;

        if(i >= text.length){
            clearInterval(timer);
            element.classList.remove("cursor");
        }

    }, speed);
}
</script>

</body>
</html>
